<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' file: data: https: http:; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>DotMD</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-section topbar-left">
        <button id="btn-toggle-sidebar" class="btn-icon" title="Toggle sidebar (⌘B)" disabled>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 6h16M4 12h10M4 18h16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="divider"></span>
        <div class="open-actions">
          <button id="btn-open-file" class="btn-ghost" title="Open file (⌘O)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8l-5-5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
              <path d="M14 3v5h5" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            </svg>
            <span>Open File</span>
          </button>
          <button id="btn-open-folder" class="btn-ghost" title="Open folder (⌘⇧O)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            </svg>
            <span>Open Folder</span>
          </button>
        </div>
      </div>

      <div class="mode-switch" role="tablist" aria-label="View mode">
        <button class="mode-btn active" data-mode="view" role="tab" aria-selected="true">View</button>
        <button class="mode-btn" data-mode="edit" role="tab" aria-selected="false">Edit</button>
        <button class="mode-btn" data-mode="split" role="tab" aria-selected="false">Split</button>
      </div>

      <div class="topbar-section topbar-right">
        <button id="btn-close" class="btn-ghost" title="Close file (⌘W)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <span>Close</span>
        </button>
        <button id="btn-save" class="btn-ghost" disabled title="Save (⌘S)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M5 3h11l3 3v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M8 3v5h7M8 21v-7h8v7" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          </svg>
          <span>Save</span>
        </button>
        <button id="btn-new-file-top" class="btn-ghost" title="New file (⌘T)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <span>New</span>
        </button>
        <button id="btn-settings" class="btn-icon" title="Settings (⌘,)">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="1.6"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="workspace">
      <aside id="sidebar" class="sidebar hidden">
        <div class="sidebar-header">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          </svg>
          <span id="folder-name" class="folder-name"></span>
          <div class="sidebar-header-actions">
            <button id="btn-new-file" class="btn-icon btn-icon-sm" title="New file (⌘T)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </button>
            <button id="btn-refresh-folder" class="btn-icon btn-icon-sm" title="Refresh file list">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M21 12a9 9 0 1 1-2.64-6.36" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                <path d="M21 3v6h-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="sidebar-controls">
          <label class="sidebar-field sidebar-search-field">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="1.6"/>
              <path d="M16 16l4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
            <input id="file-list-search" type="search" placeholder="Filter files…" autocomplete="off" spellcheck="false">
          </label>

          <div class="sidebar-field sidebar-sort-field">
            <span class="sidebar-field-label">Sort</span>
            <div class="sidebar-sort-group">
              <select id="file-list-sort" title="Sort by" aria-label="Sort by">
                <option value="name">Name</option>
                <option value="lastOpened">Last opened</option>
                <option value="modified">Last edited</option>
                <option value="created">Created</option>
                <option value="size">Size</option>
                <option value="pinned">Pinned first</option>
              </select>
              <button id="btn-sort-direction" class="btn-sort-direction" title="Toggle sort direction" aria-label="Toggle sort direction">
                <svg id="sort-direction-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M12 5v14M7 14l5 5 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>

          <div id="tag-filter" class="sidebar-field tag-filter hidden" aria-label="Filter by tags">
            <span class="sidebar-field-label">Tags</span>
            <div id="tag-filter-chips" class="tag-filter-chips"></div>
          </div>
        </div>
        <ul id="file-list" class="file-list"></ul>
        <p id="file-list-empty" class="file-list-empty hidden">No matching files</p>
        <div id="sidebar-resize-handle" class="sidebar-resize-handle" title="Drag to resize · Double-click to reset"></div>
      </aside>

      <main id="content" class="content">
        <div id="find-bar" class="find-bar hidden" role="search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="1.6"/>
            <path d="M16 16l4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <input id="find-input" type="search" placeholder="Find in file…" autocomplete="off" spellcheck="false">
          <span id="find-count" class="find-count"></span>
          <button id="find-prev" class="btn-icon btn-icon-sm" title="Previous (Shift+Enter)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 14l6-6 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button id="find-next" class="btn-icon btn-icon-sm" title="Next (Enter)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 10l6 6 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button id="find-close" class="btn-icon btn-icon-sm" title="Close (Esc)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <div id="empty-state" class="empty-state">
          <div class="empty-icon">
            <img class="empty-logo" src="logo.svg" alt="" width="94" height="56">
          </div>
          <p class="empty-subtitle">Open a Markdown file or a folder to start reading and editing.</p>
          <div class="empty-actions">
            <button id="empty-new-file" class="btn-primary">New File</button>
            <button id="empty-open-file" class="btn-secondary">Open File</button>
            <button id="empty-open-folder" class="btn-secondary">Open Folder</button>
          </div>
          <div id="empty-recents" class="empty-recents hidden">
            <section id="empty-recent-folders" class="empty-recent-section hidden">
              <h3 class="empty-recent-heading">Recent Folders</h3>
              <ul id="empty-recent-folders-list" class="empty-recent-list"></ul>
            </section>
            <section id="empty-recent-files" class="empty-recent-section hidden">
              <h3 class="empty-recent-heading">Recent Files</h3>
              <ul id="empty-recent-files-list" class="empty-recent-list"></ul>
            </section>
          </div>
        </div>

        <div id="editor-pane" class="pane editor-pane hidden">
          <div class="editor-wrap">
            <div id="editor-highlights" class="editor-highlights" aria-hidden="true"></div>
            <textarea id="editor" spellcheck="true" placeholder="Start writing…"></textarea>
          </div>
        </div>

        <div id="preview-pane" class="pane preview-pane hidden">
          <article id="preview" class="markdown-body"></article>
        </div>
      </main>
    </div>

    <footer class="statusbar">
      <span id="status-file" class="status-item">No file open</span>
      <span class="status-spacer"></span>
      <span id="status-mode" class="status-item">View</span>
      <span id="status-stats" class="status-item"></span>
    </footer>
  </div>

  <div id="settings-overlay" class="settings-overlay hidden" aria-hidden="true">
    <div class="settings-modal" role="dialog" aria-labelledby="settings-title" aria-modal="true">
      <div class="settings-header">
        <h2 id="settings-title">Settings</h2>
        <button id="settings-close" class="btn-icon" title="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="settings-body">
        <section class="settings-section">
          <h3>Appearance</h3>
          <label class="settings-field">
            <span>Theme</span>
            <select id="setting-theme">
              <option value="system">System</option>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
              <option value="sepia">Sepia</option>
              <option value="nord">Nord</option>
              <option value="solarized-light">Solarized Light</option>
              <option value="solarized-dark">Solarized Dark</option>
              <option value="dracula">Dracula</option>
              <option value="gruvbox">Gruvbox Dark</option>
              <option value="rose">Rose</option>
              <option value="forest">Forest</option>
              <option value="high-contrast">High Contrast</option>
            </select>
          </label>
        </section>
        <section class="settings-section">
          <h3>Preview</h3>
          <label class="settings-field">
            <span>Font size</span>
            <input id="setting-preview-font-size" type="number" min="12" max="24" step="1">
          </label>
          <label class="settings-field">
            <span>Font family</span>
            <div class="font-select-wrap" id="preview-font-wrap">
              <select id="setting-preview-font-family">
                <option value="__system__">System Default</option>
              </select>
              <span class="font-select-spinner" aria-hidden="true"></span>
            </div>
          </label>
          <label class="settings-field">
            <span>Max width (px)</span>
            <input id="setting-preview-max-width" type="number" min="480" max="1200" step="20">
          </label>
          <label class="settings-field">
            <span>Line height</span>
            <input id="setting-preview-line-height" type="number" min="1.2" max="2.5" step="0.1">
          </label>
        </section>
        <section class="settings-section">
          <h3>Editor</h3>
          <label class="settings-field">
            <span>Font size</span>
            <input id="setting-editor-font-size" type="number" min="11" max="24" step="1">
          </label>
          <label class="settings-field">
            <span>Font family</span>
            <div class="font-select-wrap" id="editor-font-wrap">
              <select id="setting-editor-font-family">
                <option value="__system__">System Default</option>
              </select>
              <span class="font-select-spinner" aria-hidden="true"></span>
            </div>
          </label>
          <label class="settings-field">
            <span>Tab size</span>
            <input id="setting-editor-tab-size" type="number" min="2" max="8" step="1">
          </label>
          <label class="settings-field settings-checkbox">
            <input id="setting-editor-line-wrap" type="checkbox">
            <span>Line wrapping</span>
          </label>
          <label class="settings-field settings-checkbox">
            <input id="setting-editor-spellcheck" type="checkbox">
            <span>Spellcheck</span>
          </label>
          <label class="settings-field settings-checkbox">
            <input id="setting-editor-insert-spaces" type="checkbox">
            <span>Insert spaces for tabs</span>
          </label>
        </section>
        <section class="settings-section">
          <h3>Markdown</h3>
          <label class="settings-field settings-checkbox">
            <input id="setting-markdown-breaks" type="checkbox">
            <span>GFM line breaks</span>
          </label>
          <label class="settings-field">
            <span>Default view mode</span>
            <select id="setting-default-mode">
              <option value="view">View</option>
              <option value="edit">Edit</option>
              <option value="split">Split</option>
            </select>
          </label>
        </section>
        <section class="settings-section">
          <h3>Files</h3>
          <label class="settings-field settings-checkbox">
            <input id="setting-auto-refresh" type="checkbox">
            <span>Auto-refresh folder</span>
          </label>
          <label class="settings-field settings-checkbox">
            <input id="setting-auto-save" type="checkbox">
            <span>Auto-save</span>
          </label>
          <label class="settings-field">
            <span>Auto-save interval (seconds)</span>
            <input id="setting-auto-save-interval" type="number" min="10" max="600" step="10">
          </label>
        </section>
      </div>
    </div>
  </div>

  <div id="tag-popover" class="tag-popover hidden" role="dialog" aria-label="Add tag">
    <input id="tag-popover-input" type="text" placeholder="Tag name…" autocomplete="off" spellcheck="false">
    <div id="tag-popover-suggestions" class="tag-popover-suggestions"></div>
  </div>

  <script src="vendor/marked.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
